<!doctype html><meta charset="utf-8">
<div id="out">PENDING</div>
<iframe id="fr" src="index.html" style="width:320px;height:256px;border:0"></iframe>
<script>
function emit(o){ document.getElementById('out').textContent='RESULT_START\n'+JSON.stringify(o)+'\nRESULT_END'; }
async function waitFor(f,ms){ let t=0; while(!f()&&t<ms){ await new Promise(r=>setTimeout(r,50)); t+=50; } return f(); }
function ranges(bits,lo,hi){ const o=[]; let s=-1; for(let a=lo;a<=hi;a++){ if(bits[a]){ if(s<0)s=a; } else if(s>=0){ o.push([s,a-1]); s=-1; } } if(s>=0)o.push([s,hi]); return o; }
function cnt(bits,lo,hi){ let n=0; for(let a=lo;a<=hi;a++) if(bits[a]) n++; return n; }
const hx=a=>'0x'+a.toString(16);
async function main(){
  const fr=document.getElementById('fr'); const W=()=>fr.contentWindow;
  if(!await waitFor(()=>W()&&W().spectrum&&W().zxDebug,30000)) return emit({err:'no spectrum'});
  const s=W().spectrum, zx=W().zxDebug, F=W().fetch.bind(W()); const rd=a=>s.memory.read(a),wr=(a,v)=>s.memory.write(a,v), ula=s.ula;
  const key=(code,down,up)=>{ ula.keyDown&&ula.keyDown(code); for(let i=0;i<down;i++) s.runFrame(); if(ula.keyUp)ula.keyUp(code); if(ula.keyboardState)ula.keyboardState.fill(0xff); for(let i=0;i<(up||6);i++) s.runFrame(); };
  try{
    if(!s.romLoaded){ try{ await s.loadRom('roms/48.rom'); s.reset&&s.reset(); }catch(e){} }
    await waitFor(()=>rd(0)===0xF3,8000);
    s.setTapeFlashLoad&&s.setTapeFlashLoad(true);
    await zx.loadFile(new Uint8Array(await F('_bard_t1s1.tzx').then(r=>r.arrayBuffer())),'game.tzx');
    await zx.autoLoad({type:'tape', isTzx:true, maxFrames:14000, settleFrames:1500});
    s.cpu.pc=0x5B00; for(let i=0;i<300;i++) s.runFrame();      // Guild
    key('KeyE',18,120);                                        // -> Skara Brae 3D view
    const lv=new Uint8Array(await F('_level_02.bin').then(r=>r.arrayBuffer()));
    for(let i=0;i<lv.length;i++) wr(0xC18C+i, lv[i]);          // overlay Cellars
    for(let i=0;i<20;i++) s.runFrame();

    // 17 special cells from MAZE_FEATURES (row,col)
    const specials=[[0,0],[1,1],[3,15],[3,17],[5,2],[7,15],[8,2],[8,3],[10,18],[11,10],[12,17],[13,17],[16,7],[16,16],[18,2],[18,3],[18,7]];
    const XY=0x5FAC, FACE=0x5FAE;
    zx.clearMap&&zx.clearMap(); zx.enableMap(true,{fast:true});
    // general wander first (random ambush -> combat handlers)
    wr(XY,5); wr(XY+1,5); wr(FACE,0);
    for(const m of ['KeyI','KeyI','KeyL','KeyI','KeyJ','KeyI','KeyK','KeyI','KeyI','KeyL','KeyI','KeyJ']) key(m,8,10);
    // visit each special: place adjacent, face it, step on, answer prompts
    const answer=['KeyI','KeyE','KeyO','KeyD','KeyT','KeyL','KeyA','KeyF','KeyY','KeyN','Space','KeyC'];
    for(const [r,c] of specials){
      wr(XY, (r-1)&0xff); wr(XY+1, c&0xff); wr(FACE,0);   // just north of it, facing S(+)
      for(const k of answer) key(k,6,6);
    }
    zx.enableMap(false,{fast:true});
    const mb=zx.mapBits(), ex=mb.execBits, rb=mb.readBits, OL=0xC18C,OH=0xFB50;
    s.renderToScreen&&s.renderToScreen();
    emit({
      pc:hx(s.cpu.pc),
      overlay_exec:cnt(ex,OL,OH), overlay_read:cnt(rb,OL,OH),
      handlers_D1D8_DC51_exec: cnt(ex,0xD1D8,0xDC51),
      shared_exec_5B00_C18B: cnt(ex,0x5B00,0xC18B),
      gfx_E6A8_F2E9_exec: cnt(ex,0xE6A8,0xF2E9), gfx_E6A8_F2E9_read: cnt(rb,0xE6A8,0xF2E9),
      maze_read: cnt(rb,0xF2EA,0xF6B1),
      exec_ranges: ranges(ex,OL,OH).map(r=>[hx(r[0]),hx(r[1])]),
      png: s.canvas? s.canvas.toDataURL('image/png') : ''
    });
  }catch(e){ emit({err:String(e), stack:String(e&&e.stack).slice(0,500)}); }
}
main();
</script>
